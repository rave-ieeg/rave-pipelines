<li class="shidashi-nav-item shidashi-nav-group{{ if(active){' menu-open'}else{''} }}">
  <a href="#" class="shidashi-nav-link shidashi-nav-dropdown{{ if(active){' active'}else{''} }}">
    {{ icon }}
    <span>{{ text }}</span>
    <i class="fas fa-angle-left shidashi-nav-arrow"></i>
  </a>
  <ul class="shidashi-nav shidashi-nav-treeview">
    {{ sub_items }}
  </ul>
</li>
